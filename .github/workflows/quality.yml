name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-addons:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python and parse XML
        run: python3 tools/validate_addons.py

      - name: Run Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check .
